<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Student</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #74ebd5, #9face6);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 450px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        .title {
            font-weight: bold;
            text-align: center;
        }

        .btn-primary {
            width: 100%;
        }

        .link {
            display: block;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="card p-4 bg-white">

    <h3 class="title mb-4">➕ Add Student</h3>

    <form action="/add" method="POST">

        <div class="mb-3">
            <label class="form-label">First Name</label>
            <input type="text" name="first_name" class="form-control"
                   placeholder="Enter First Name" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Last Name</label>
            <input type="text" name="last_name" class="form-control"
                   placeholder="Enter Last Name" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Registration Number</label>
            <input type="text" name="reg_no" class="form-control"
                   placeholder="Enter Registration Number" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Subjects</label>
            <input type="text" name="subjects" class="form-control"
                   placeholder="e.g. Math, Physics, CS" required>
        </div>

        <div class="mb-3">
            <label class="form-label">CGPA</label>
            <input type="number" step="0.01" name="cgpa" class="form-control"
                   placeholder="Enter CGPA" required>
        </div>

        <button type="submit" class="btn btn-primary">
            💾 Save Student
        </button>

    </form>

    <a href="/" class="link">
        🔙 Back to Portal
    </a>

</div>

</body>
</html>
