<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Result</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #74ebd5, #9face6);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 450px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        .title {
            font-weight: bold;
            text-align: center;
        }

        .info p {
            margin-bottom: 10px;
            font-size: 16px;
        }

        .btn {
            width: 100%;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="card p-4 bg-white">

    <h3 class="title mb-4">🎓 Student Details</h3>

    <div class="info">

        <p><b>First Name:</b> {{ student[1] }}</p>

        <p><b>Last Name:</b> {{ student[2] }}</p>

        <p><b>Registration No:</b> {{ student[3] }}</p>

        <p><b>Subjects:</b> {{ student[4] }}</p>

        <p><b>CGPA:</b> {{ student[5] }}</p>

    </div>

    <a href="/" class="btn btn-primary mt-3">
        🔙 Back to Portal
    </a>

</div>

</body>
</html>
